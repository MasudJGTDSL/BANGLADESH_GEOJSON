{% if user.is_authenticated %}
                    <!-- DaisyUI Modal -->
                    <dialog id="backup-modal" class="modal">
                      <fieldset class="fieldset bg-base-200 border-base-300 rounded-box p-0 w-lg border">
                    <form method="dialog" class="modal-box w-lg mb-0">
                        <legend class="fieldset-legend text-lg">🔑Enter Backup Password</legend>
                        <p class="!py-0 !mb-0 text-sm">Your backup zip will be encrypted with this password.</p>
                        <div id="my_toast" class="relative" style="height: 2.25rem; padding: 0; margin: 0 0 0.6rem;"></div>
                        <div class="join w-full">
                            <input type="password" id="backup-password" 
                            class="input join-item w-full" 
                            placeholder="Enter password" required />
                            <div id="id_password_helptext"></div>
                        </div>
                        <div class="modal-action">
                        <button class="btn btn-sm btn-accent" onclick="document.getElementById('backup-modal').close()">Cancel</button>
                        <button type="button" class="btn btn-sm btn-primary" onclick="startBackup()">Download</button>
                        </div>
                        </fieldset>
                    </form>
                    </dialog>
                    <!-- Spinner (hidden by default) -->
                    <div id="loading-spinner" class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-30 z-50">
                    <span class="loading loading-spinner loading-lg text-info"></span>
                    </div>

                    <!-- Toast Container -->
                    <div id="toast" class="toast toast-center toast-middle  min-w-3xl"></div>

                    <!-- TODO: Backup End -->

  <script>
function startBackup() {
    const password = document.getElementById("backup-password").value;
    if (!password) {
        showToast(`<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
  </svg><span>Password is required!</span>`, "error", tost_id="my_toast");
        return;
    }

    // Close modal
    document.getElementById("backup-modal").close();

    // Show busy cursor + spinner
    document.body.style.cursor = "wait";
    document.getElementById("loading-spinner").classList.remove("hidden");

    fetch("/backup_files/", {
        method: "POST",
        headers: {
            "X-CSRFToken": "{{ csrf_token }}",
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "password=" + encodeURIComponent(password)
    })
    .then(response => {
        if (!response.ok) throw new Error("Backup failed");
        return response.blob();
    })
    .then(blob => {
        const now = new Date();
        const yyyymmdd = now.getFullYear().toString() +
                 String(now.getMonth() + 1).padStart(2, '0') +
                 String(now.getDate()).padStart(2, '0');

        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "{{ backup_file_name }}" + "_" + yyyymmdd + ".zip";
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);

        showToast("Database backup completed!", "success");
    })
    .catch(err => {
        showToast("Error: " + err.message, "error");
    })
    .finally(() => {
        // Reset cursor + hide spinner
        document.body.style.cursor = "default";
        document.getElementById("loading-spinner").classList.add("hidden");
    });
}

function showToast(message, type="info",tost_id="toast") {
    if (tost_id=="my_toast"){
        var clsList = `alert alert-${type} absolute py-1 my-1 fs-3 font-medium !text-center w-full`
    } else {
        var clsList = `alert alert-${type}`
    }
    const toast = document.getElementById(tost_id);
    const div = document.createElement("div");
    div.role = "alert";
    div.className = clsList;
    div.innerHTML = message;
    toast.appendChild(div);
    setTimeout(() => div.remove(), 4000);
}
</script>
